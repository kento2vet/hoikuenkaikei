<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 父母会会計</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100vh;padding-bottom:80px}
.header{background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.1);padding:16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:17px;font-weight:500}
.year-badge{background:#E1F5EE;color:#0F6E56;padding:4px 10px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:none}
.summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px}
.metric{background:#fff;border-radius:12px;padding:14px;border:0.5px solid rgba(0,0,0,0.08)}
.metric-label{font-size:12px;color:#888;margin-bottom:4px}
.metric-value{font-size:20px;font-weight:500}
.metric-value.income{color:#0F6E56}
.metric-value.expense{color:#993C1D}
.section{padding:0 14px;margin-bottom:14px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.section-title{font-size:14px;font-weight:500;color:#888}
.btn-add{background:#1D9E75;color:white;border:none;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px}
.hint{font-size:12px;color:#888;padding:0 14px 8px;display:flex;align-items:center;gap:4px}
.card-wrap{position:relative;overflow:hidden;border-radius:12px;margin-bottom:10px}
.delete-bg{position:absolute;inset:0;background:#FAECE7;display:flex;align-items:center;justify-content:flex-end;padding-right:20px;border-radius:12px}
.delete-bg-label{color:#993C1D;font-size:13px;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:3px}
.receipt-card{background:#fff;border-radius:12px;border:0.5px solid rgba(0,0,0,0.08);padding:14px;cursor:pointer;transition:transform 0.2s ease;position:relative;z-index:1;touch-action:pan-y}
.receipt-card.swiping{transition:none}
.receipt-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.receipt-info{flex:1;min-width:0}
.receipt-title{font-size:15px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.receipt-date{font-size:12px;color:#888}
.receipt-category{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;margin-top:4px}
.cat-undokai{background:#FAEEDA;color:#633806}
.cat-sotsuenshiki{background:#EEEDFE;color:#3C3489}
.cat-other{background:#F1EFE8;color:#444441}
.receipt-amount{font-size:17px;font-weight:500;white-space:nowrap}
.receipt-amount.expense{color:#993C1D}
.receipt-amount.income{color:#0F6E56}
.receipt-thumb{width:48px;height:48px;border-radius:8px;object-fit:cover;border:0.5px solid rgba(0,0,0,0.1);flex-shrink:0}
.receipt-thumb-placeholder{width:48px;height:48px;border-radius:8px;background:#f5f5f0;border:0.5px dashed rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#aaa}
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid rgba(0,0,0,0.1);display:flex;padding:8px 0;padding-bottom:max(8px,env(safe-area-inset-bottom))}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px;color:#888;font-size:11px;border:none;background:none}
.nav-item.active{color:#1D9E75}
.nav-icon{width:22px;height:22px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:90vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:rgba(0,0,0,0.15);border-radius:2px;margin:0 auto 20px}
.modal-title{font-size:18px;font-weight:500;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-label{font-size:13px;color:#888;margin-bottom:6px;display:block}
.form-input{width:100%;padding:10px 12px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;font-size:16px;background:#fff;color:#1a1a18;font-family:inherit}
.form-input:focus{outline:none;border-color:#1D9E75}
.form-select{width:100%;padding:10px 12px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;font-size:16px;background:#fff;color:#1a1a18;appearance:none;font-family:inherit}
.upload-area{border:1.5px dashed rgba(0,0,0,0.2);border-radius:12px;padding:24px;text-align:center;cursor:pointer;background:#f5f5f0;position:relative}
.upload-area input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer}
.upload-icon{font-size:32px;margin-bottom:8px}
.upload-text{font-size:14px;color:#888}
.upload-preview{width:100%;border-radius:8px;margin-top:12px;display:none}
.ai-badge{display:inline-flex;align-items:center;gap:4px;background:#E1F5EE;color:#0F6E56;padding:4px 10px;border-radius:20px;font-size:12px;margin-bottom:12px}
.ai-loading{display:none;text-align:center;padding:12px;color:#888;font-size:14px}
.btn-primary{background:#1D9E75;color:white;border:none;border-radius:8px;padding:14px;width:100%;font-size:16px;font-weight:500;cursor:pointer;margin-top:8px;font-family:inherit}
.btn-cancel{background:none;color:#888;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;padding:12px;width:100%;font-size:15px;cursor:pointer;margin-top:8px;font-family:inherit}
.page{display:none}
.page.active{display:block}
.year-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:300;align-items:center;justify-content:center}
.year-modal.open{display:flex}
.year-picker{background:#fff;border-radius:12px;padding:20px;min-width:200px}
.year-option{padding:14px 20px;text-align:center;cursor:pointer;font-size:16px;border-radius:8px}
.year-option:hover{background:#f5f5f0}
.year-option.selected{color:#1D9E75;font-weight:500}
.empty-state{text-align:center;padding:40px 20px;color:#888}
.empty-state-icon{font-size:48px;margin-bottom:12px}
.report-table{background:#fff;border-radius:12px;border:0.5px solid rgba(0,0,0,0.08);overflow:hidden;margin-bottom:14px}
.report-row{display:flex;justify-content:space-between;padding:12px 16px;border-bottom:0.5px solid rgba(0,0,0,0.06);font-size:14px}
.report-row:last-child{border-bottom:none}
.report-row.total{font-weight:500;background:#f5f5f0}
.type-toggle{display:flex;gap:8px;margin-bottom:16px}
.type-btn{flex:1;padding:10px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.15);background:none;font-size:14px;cursor:pointer;color:#888;font-family:inherit}
.type-btn.active-expense{background:#FAECE7;color:#993C1D;border-color:#D85A30}
.type-btn.active-income{background:#E1F5EE;color:#0F6E56;border-color:#1D9E75}
.csv-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:#fff;border:0.5px solid rgba(0,0,0,0.15);border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;color:#1a1a18;margin-bottom:10px;font-family:inherit}
.csv-section{padding:0 14px;margin-bottom:16px}
.csv-section-title{font-size:14px;font-weight:500;color:#888;margin-bottom:10px}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#2C2C2A;color:white;padding:10px 20px;border-radius:20px;font-size:14px;z-index:500;display:none;white-space:nowrap}
.confirm-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:400;align-items:center;justify-content:center;padding:20px}
.confirm-modal.open{display:flex}
.confirm-box{background:#fff;border-radius:12px;padding:24px;width:100%;max-width:320px}
.confirm-title{font-size:17px;font-weight:500;margin-bottom:8px}
.confirm-body{font-size:14px;color:#888;margin-bottom:20px;line-height:1.6}
.confirm-item{font-weight:500;color:#1a1a18}
.confirm-btns{display:flex;gap:10px}
.confirm-btns button{flex:1;padding:12px;border-radius:8px;font-size:15px;cursor:pointer;border:none;font-family:inherit}
.btn-confirm-cancel{background:#f5f5f0;color:#1a1a18}
.btn-confirm-delete{background:#D85A30;color:white;font-weight:500}
</style>
</head>
<body>

<div class="header">
  <h1>🌸 父母会会計</h1>
  <button class="year-badge" onclick="openYearModal()" id="year-display">2024年度</button>
</div>

<div class="page active" id="page-home">
  <div class="summary">
    <div class="metric"><div class="metric-label">収入合計</div><div class="metric-value income" id="total-income">¥0</div></div>
    <div class="metric"><div class="metric-label">支出合計</div><div class="metric-value expense" id="total-expense">¥0</div></div>
    <div class="metric"><div class="metric-label">残高</div><div class="metric-value" id="total-balance">¥0</div></div>
    <div class="metric"><div class="metric-label">件数</div><div class="metric-value" id="total-count">0件</div></div>
  </div>
  <div class="section">
    <div class="section-header">
      <div class="section-title">最近の記録</div>
      <button class="btn-add" onclick="openAddModal()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
        追加
      </button>
    </div>
    <div class="hint">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg>
      左にスワイプして削除
    </div>
    <div id="receipt-list"></div>
  </div>
</div>

<div class="page" id="page-report">
  <div class="section" style="padding-top:14px">
    <div class="section-title" style="margin-bottom:12px">カテゴリ別集計</div>
    <div id="category-report"></div>
    <div class="section-title" style="margin-bottom:12px;margin-top:16px">月別集計</div>
    <div id="monthly-report"></div>
  </div>
  <div class="csv-section">
    <div class="csv-section-title">CSV出力（決算用）</div>
    <button class="csv-btn" onclick="exportCSV('all')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      全件CSVをダウンロード
    </button>
    <button class="csv-btn" onclick="exportCSV('expense')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      支出のみCSV
    </button>
    <button class="csv-btn" onclick="exportCSV('income')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      収入のみCSV
    </button>
  </div>
</div>

<nav class="nav">
  <button class="nav-item active" id="nav-home" onclick="switchPage('home')">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    ホーム
  </button>
  <button class="nav-item" id="nav-report" onclick="switchPage('report')">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>
    レポート
  </button>
</nav>

<!-- Add Modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">記録を追加</div>
    <div class="type-toggle">
      <button class="type-btn active-expense" id="btn-expense" onclick="setType('expense')">支出</button>
      <button class="type-btn" id="btn-income" onclick="setType('income')">収入</button>
    </div>
    <div class="form-group">
      <label class="form-label">領収書・画像（AI自動読取）</label>
      <div class="upload-area">
        <input type="file" accept="image/*" capture="environment" id="receipt-image" onchange="handleImageUpload(this)">
        <div class="upload-icon">📷</div>
        <div class="upload-text">タップして撮影 または 画像を選択</div>
      </div>
      <img id="upload-preview" class="upload-preview">
      <div class="ai-loading" id="ai-loading">✨ AIが領収書を読み取り中...</div>
    </div>
    <div id="ai-result" style="display:none" class="form-group">
      <div class="ai-badge">✨ AIが自動入力しました</div>
    </div>
    <div class="form-group">
      <label class="form-label">日付</label>
      <input type="date" class="form-input" id="input-date">
    </div>
    <div class="form-group">
      <label class="form-label">内容・摘要</label>
      <input type="text" class="form-input" id="input-title" placeholder="例：テント修理費">
    </div>
    <div class="form-group">
      <label class="form-label">金額（円）</label>
      <input type="number" class="form-input" id="input-amount" placeholder="0" inputmode="numeric">
    </div>
    <div class="form-group">
      <label class="form-label">カテゴリ</label>
      <select class="form-select" id="input-category">
        <option value="undokai">🏃 運動会</option>
        <option value="sotsuenshiki">🎓 卒園式</option>
        <option value="other">📋 その他</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">メモ</label>
      <input type="text" class="form-input" id="input-memo" placeholder="任意">
    </div>
    <button class="btn-primary" onclick="saveRecord()">保存する</button>
    <button class="btn-cancel" onclick="closeAddModal()">キャンセル</button>
  </div>
</div>

<!-- Year Modal -->
<div class="year-modal" id="year-modal" onclick="closeYearModal(event)">
  <div class="year-picker" id="year-picker"></div>
</div>

<!-- Confirm Delete Modal -->
<div class="confirm-modal" id="confirm-modal">
  <div class="confirm-box">
    <div class="confirm-title">この記録を削除しますか？</div>
    <div class="confirm-body"><span class="confirm-item" id="confirm-item-name"></span><br>この操作は元に戻せません。</div>
    <div class="confirm-btns">
      <button class="btn-confirm-cancel" onclick="closeConfirm()">キャンセル</button>
      <button class="btn-confirm-delete" onclick="confirmDelete()">削除する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ANTHROPIC_API_KEY = 'YOUR_API_KEY_HERE'; // ← ここにAPIキーを入力
const CATS={undokai:'🏃 運動会',sotsuenshiki:'🎓 卒園式',other:'📋 その他'};
const CAT_CLASSES={undokai:'cat-undokai',sotsuenshiki:'cat-sotsuenshiki',other:'cat-other'};
const CAT_KEYS=['undokai','sotsuenshiki','other'];
let currentYear=2024;
let currentType='expense';
let uploadedImageData=null;
let pendingDeleteId=null;

function getData(){try{const s=localStorage.getItem('kaikei_v2_'+currentYear);if(s)return JSON.parse(s);}catch(e){}return[];}
function saveData(d){try{localStorage.setItem('kaikei_v2_'+currentYear,JSON.stringify(d));}catch(e){}}
let records=getData();

function fmt(n){return '¥'+Math.abs(n).toLocaleString('ja-JP');}

function attachSwipe(wrap,card,id){
  let startX=0,curX=0,dragging=false;
  const THRESHOLD=80;
  function onStart(e){startX=e.type==='touchstart'?e.touches[0].clientX:e.clientX;curX=0;dragging=true;card.classList.add('swiping');}
  function onMove(e){if(!dragging)return;const x=(e.type==='touchmove'?e.touches[0].clientX:e.clientX)-startX;curX=Math.min(0,x);card.style.transform=`translateX(${curX}px)`;}
  function onEnd(){if(!dragging)return;dragging=false;card.classList.remove('swiping');if(curX<-THRESHOLD){card.style.transform='translateX(-80px)';askDelete(id);}else{card.style.transform='translateX(0)';}}
  card.addEventListener('touchstart',onStart,{passive:true});
  card.addEventListener('touchmove',onMove,{passive:true});
  card.addEventListener('touchend',onEnd);
  card.addEventListener('mousedown',onStart);
  window.addEventListener('mousemove',onMove);
  window.addEventListener('mouseup',onEnd);
}

function askDelete(id){
  const rec=records.find(r=>r.id===id);if(!rec)return;
  pendingDeleteId=id;
  document.getElementById('confirm-item-name').textContent=`${rec.date}　${rec.title}　${fmt(rec.amount)}`;
  document.getElementById('confirm-modal').classList.add('open');
}
function closeConfirm(){document.getElementById('confirm-modal').classList.remove('open');pendingDeleteId=null;renderHome();}
function confirmDelete(){
  if(pendingDeleteId===null)return;
  records=records.filter(r=>r.id!==pendingDeleteId);
  saveData(records);pendingDeleteId=null;
  document.getElementById('confirm-modal').classList.remove('open');
  renderHome();showToast('削除しました');
}

function renderHome(){
  const income=records.filter(x=>x.type==='income').reduce((a,x)=>a+x.amount,0);
  const expense=records.filter(x=>x.type==='expense').reduce((a,x)=>a+x.amount,0);
  const bal=income-expense;
  document.getElementById('total-income').textContent=fmt(income);
  document.getElementById('total-expense').textContent=fmt(expense);
  const balEl=document.getElementById('total-balance');
  balEl.textContent=(bal>=0?'':'−')+fmt(bal);
  balEl.style.color=bal>=0?'#0F6E56':'#993C1D';
  document.getElementById('total-count').textContent=records.length+'件';
  const sorted=[...records].sort((a,b)=>b.date.localeCompare(a.date));
  const list=document.getElementById('receipt-list');
  if(sorted.length===0){list.innerHTML='<div class="empty-state"><div class="empty-state-icon">📂</div><div>記録がありません<br>「追加」から登録してください</div></div>';return;}
  list.innerHTML='';
  sorted.slice(0,50).forEach(x=>{
    const wrap=document.createElement('div');wrap.className='card-wrap';
    wrap.innerHTML=`
      <div class="delete-bg"><div class="delete-bg-label">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#993C1D" stroke-width="1.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        削除</div></div>
      <div class="receipt-card" data-id="${x.id}">
        <div class="receipt-row">
          <div class="receipt-info">
            <div class="receipt-title">${x.title}</div>
            <div class="receipt-date">${x.date}</div>
            <span class="receipt-category ${CAT_CLASSES[x.category]||'cat-other'}">${CATS[x.category]||'その他'}</span>
            ${x.memo?`<div style="font-size:12px;color:#888;margin-top:3px">${x.memo}</div>`:''}
          </div>
          ${x.imageData?`<img class="receipt-thumb" src="${x.imageData}">`:'<div class="receipt-thumb-placeholder"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>'}
          <div class="receipt-amount ${x.type}">${x.type==='expense'?'−':'+'}${fmt(x.amount)}</div>
        </div>
      </div>`;
    list.appendChild(wrap);
    attachSwipe(wrap,wrap.querySelector('.receipt-card'),x.id);
  });
}

function renderReport(){
  const income=records.filter(x=>x.type==='income').reduce((a,x)=>a+x.amount,0);
  const expense=records.filter(x=>x.type==='expense').reduce((a,x)=>a+x.amount,0);
  const rows=CAT_KEYS.map(k=>({k,exp:records.filter(x=>x.type==='expense'&&x.category===k).reduce((a,x)=>a+x.amount,0),inc:records.filter(x=>x.type==='income'&&x.category===k).reduce((a,x)=>a+x.amount,0)})).filter(r=>r.exp>0||r.inc>0);
  document.getElementById('category-report').innerHTML='<div class="report-table">'+rows.map(r=>`<div class="report-row"><span>${CATS[r.k]}</span><span>${r.inc>0?`<span style="color:#0F6E56;margin-right:8px">+${fmt(r.inc)}</span>`:''}${r.exp>0?`<span style="color:#993C1D">−${fmt(r.exp)}</span>`:''}</span></div>`).join('')+`<div class="report-row total"><span>合計残高</span><span style="color:${income-expense>=0?'#0F6E56':'#993C1D'}">${income-expense>=0?'+':'−'}${fmt(income-expense)}</span></div></div>`;
  const monthTotals={};
  records.forEach(x=>{const m=x.date.slice(0,7);if(!monthTotals[m])monthTotals[m]={income:0,expense:0};monthTotals[m][x.type]+=x.amount;});
  const mEntries=Object.entries(monthTotals).sort((a,b)=>a[0].localeCompare(b[0]));
  document.getElementById('monthly-report').innerHTML=mEntries.length===0?'<div style="color:#888;font-size:14px;padding:8px">データがありません</div>':'<div class="report-table">'+mEntries.map(([m,v])=>`<div class="report-row"><span style="font-weight:500">${m.replace('-','年')}月</span><span>${v.income>0?`<span style="color:#0F6E56;margin-right:8px">+${fmt(v.income)}</span>`:''}${v.expense>0?`<span style="color:#993C1D">−${fmt(v.expense)}</span>`:''}</span></div>`).join('')+'</div>';
}

function exportCSV(filter){
  let data=records;
  if(filter==='expense')data=records.filter(x=>x.type==='expense');
  if(filter==='income')data=records.filter(x=>x.type==='income');
  const sorted=[...data].sort((a,b)=>a.date.localeCompare(b.date));
  const income=data.filter(x=>x.type==='income').reduce((a,x)=>a+x.amount,0);
  const expense=data.filter(x=>x.type==='expense').reduce((a,x)=>a+x.amount,0);
  const csv='\uFEFF'+[['日付','種別','カテゴリ','内容・摘要','金額（円）','メモ'],...sorted.map(x=>[x.date,x.type==='income'?'収入':'支出',CATS[x.category]||'その他',x.title,x.amount,x.memo||'']),[], ['--- 集計 ---','','','','',''],['収入合計','','','',income,''],['支出合計','','','',expense,''],['残高','','','',income-expense,'']].map(r=>r.map(v=>{const s=String(v);return s.includes(',')||s.includes('"')||s.includes('\n')?`"${s.replace(/"/g,'""')}"`:s;}).join(',')).join('\r\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`父母会会計_${currentYear}年度_${filter==='expense'?'支出':filter==='income'?'収入':'全件'}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  showToast('CSVをダウンロードしました');
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>{t.style.display='none';},2500);}

function switchPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('nav-'+p).classList.add('active');
  if(p==='report')renderReport();
}

function openYearModal(){
  document.getElementById('year-picker').innerHTML='<div style="font-size:14px;color:#888;margin-bottom:8px;text-align:center">年度を選択</div>'+[2022,2023,2024,2025,2026].map(y=>`<div class="year-option ${y===currentYear?'selected':''}" onclick="selectYear(${y})">${y}年度</div>`).join('');
  document.getElementById('year-modal').classList.add('open');
}
function closeYearModal(e){if(!e||e.target===document.getElementById('year-modal'))document.getElementById('year-modal').classList.remove('open');}
function selectYear(y){currentYear=y;records=getData();document.getElementById('year-display').textContent=y+'年度';closeYearModal();renderHome();if(document.getElementById('page-report').classList.contains('active'))renderReport();}

function openAddModal(){
  document.getElementById('add-modal').classList.add('open');
  document.getElementById('input-date').value=new Date().toISOString().split('T')[0];
  ['input-title','input-amount','input-memo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('upload-preview').style.display='none';
  document.getElementById('ai-result').style.display='none';
  document.getElementById('ai-loading').style.display='none';
  uploadedImageData=null;setType('expense');
}
function closeAddModal(){document.getElementById('add-modal').classList.remove('open');}
function setType(t){currentType=t;document.getElementById('btn-expense').className='type-btn'+(t==='expense'?' active-expense':'');document.getElementById('btn-income').className='type-btn'+(t==='income'?' active-income':'');}

async function handleImageUpload(input){
  if(!input.files||!input.files[0])return;
  const reader=new FileReader();
  reader.onload=async function(e){
    uploadedImageData=e.target.result;
    const preview=document.getElementById('upload-preview');
    preview.src=uploadedImageData;preview.style.display='block';
    document.getElementById('ai-loading').style.display='block';
    document.getElementById('ai-result').style.display='none';
    await analyzeReceipt(uploadedImageData);
  };
  reader.readAsDataURL(input.files[0]);
}

async function analyzeReceipt(imageDataUrl){
  if(ANTHROPIC_API_KEY==='YOUR_API_KEY_HERE'){
    document.getElementById('ai-loading').style.display='none';
    showToast('APIキーを設定してください');return;
  }
  try{
    const base64=imageDataUrl.split(',')[1];
    const mediaType=imageDataUrl.split(';')[0].split(':')[1];
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':ANTHROPIC_API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-opus-4-5',max_tokens:500,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mediaType,data:base64}},{type:'text',text:'この領収書から情報を抽出してJSONのみ返してください（前後に文字不要）:\n{"date":"YYYY-MM-DD","title":"内容を簡潔に","amount":金額の数値,"category":"undokai|sotsuenshiki|other","memo":"補足があれば"}\ncategoryは運動会関連→undokai、卒園式関連→sotsuenshiki、それ以外→other'}]}]})
    });
    const d=await res.json();
    const text=d.content?.[0]?.text||'{}';
    let p;try{p=JSON.parse(text.replace(/```json?|```/g,'').trim());}catch(e){p={};}
    document.getElementById('ai-loading').style.display='none';
    if(p.date)document.getElementById('input-date').value=p.date;
    if(p.title)document.getElementById('input-title').value=p.title;
    if(p.amount)document.getElementById('input-amount').value=p.amount;
    if(p.category)document.getElementById('input-category').value=p.category;
    if(p.memo)document.getElementById('input-memo').value=p.memo;
    document.getElementById('ai-result').style.display='block';
  }catch(e){document.getElementById('ai-loading').style.display='none';showToast('AI読み取りに失敗しました');}
}

function saveRecord(){
  const date=document.getElementById('input-date').value;
  const title=document.getElementById('input-title').value.trim();
  const amount=parseInt(document.getElementById('input-amount').value)||0;
  const category=document.getElementById('input-category').value;
  const memo=document.getElementById('input-memo').value.trim();
  if(!date||!title||!amount){alert('日付・内容・金額は必須です');return;}
  records.unshift({id:Date.now(),date,title,amount,type:currentType,category,memo,imageData:uploadedImageData});
  saveData(records);closeAddModal();renderHome();showToast('保存しました');
}

renderHome();
</script>
